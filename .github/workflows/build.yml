name: Build & Boot Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools

      - name: Install bootimage
        run: cargo install bootimage

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Build kernel
        run: cargo bootimage

      - name: Boot test (5 second timeout)
        run: |
          timeout 5 qemu-system-x86_64 \
            -drive format=raw,file=target/x86_64-unknown-none/debug/bootimage-merlion-kernel.bin \
            -display none \
            -serial stdio \
            -device isa-debug-exit,iobase=0xf4,iosize=0x04 \
            2>&1 | tee boot.log || true

          # Verify kernel reached shell
          if grep -q "Shell active" boot.log; then
            echo "✅ Boot successful — kernel reached shell"
          else
            echo "❌ Boot failed — shell not reached"
            cat boot.log
            exit 1
          fi

      - name: Verify key subsystems initialized
        run: |
          echo "Checking subsystem initialization..."
          for check in "GDT loaded" "IDT" "Heap" "Task system" "VFS" "Drivers" "RTC"; do
            if grep -q "$check" boot.log; then
              echo "  ✅ $check"
            else
              echo "  ❌ $check missing"
              exit 1
            fi
          done
          echo "All subsystems OK"

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: boot.log
