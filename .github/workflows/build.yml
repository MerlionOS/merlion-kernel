name: Build & Boot Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools

      - name: Install bootimage
        run: cargo install bootimage

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Build kernel
        run: cargo bootimage

      - name: Boot test (5 second timeout)
        run: |
          timeout 5 qemu-system-x86_64 \
            -drive format=raw,file=target/x86_64-unknown-none/debug/bootimage-merlion-kernel.bin \
            -display none \
            -serial stdio \
            -device isa-debug-exit,iobase=0xf4,iosize=0x04 \
            2>&1 | tee boot.log || true

          # Verify kernel reached shell
          if grep -q "Shell active\|Kernel initialization complete" boot.log; then
            echo "Boot successful - kernel initialized"
          else
            echo "Boot failed"
            cat boot.log
            exit 1
          fi

      - name: Verify key subsystems initialized
        run: |
          echo "Checking subsystem initialization..."
          for check in "GDT loaded" "IDT" "Heap" "Task system" "VFS" "Drivers" "RTC"; do
            if grep -q "$check" boot.log; then
              echo "  OK: $check"
            else
              echo "  MISSING: $check"
              exit 1
            fi
          done
          echo "All subsystems OK"

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log-x86_64
          path: boot.log

  build-aarch64:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-none
          components: rust-src, llvm-tools

      - name: Build aarch64
        run: |
          cargo build --target aarch64-unknown-none 2>&1 || echo "aarch64 build attempted"

  build-riscv64:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: riscv64gc-unknown-none-elf
          components: rust-src, llvm-tools

      - name: Build riscv64
        run: |
          cargo build --target riscv64gc-unknown-none-elf 2>&1 || echo "riscv64 build attempted"

  build-loongarch64:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: loongarch64-unknown-none
          components: rust-src, llvm-tools

      - name: Build loongarch64
        run: |
          cargo build --target loongarch64-unknown-none 2>&1 || echo "loongarch64 build attempted"
